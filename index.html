  <style>
    :root {
      --bg: #0c0f13;
      --panel: #161a21;
      --panel2: #1b2029;
      --text: #f4f7fb;
      --muted: #aab3c2;
      --blue: #4AA5F6;
      --gold: #D8A44B;
      --line: rgba(255,255,255,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(74,165,246,.16), transparent 24%),
        radial-gradient(circle at 85% 10%, rgba(74,165,246,.10), transparent 18%),
        linear-gradient(180deg, #11151b 0%, #0b0e12 100%);
      display: grid;
      place-items: center;
      padding: 26px;
    }
    .shell { width: min(980px, 100%); }
    .card {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)),
        linear-gradient(135deg, #1b2028 0%, #131820 54%, #171c23 100%);
      box-shadow: 0 24px 70px rgba(0,0,0,.42);
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 84% 16%, rgba(74,165,246,.18), transparent 18%),
        linear-gradient(120deg, transparent 0%, transparent 68%, rgba(74,165,246,.08) 78%, transparent 100%),
        linear-gradient(0deg, transparent 0%, transparent 80%, rgba(216,164,75,.08) 100%);
      pointer-events: none;
    }
    .hero {
      position: relative;
      padding: 28px 32px 22px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 24px;
      align-items: center;
    }
    .headshot-wrap {
      width: 116px; height: 116px; border-radius: 50%;
      padding: 4px;
      background: linear-gradient(180deg, var(--blue), #6ab5fb);
      box-shadow: 0 0 0 10px rgba(74,165,246,.08);
    }
    .headshot { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
    h1 { margin: 0; font-size: clamp(34px, 6vw, 54px); line-height: 1; letter-spacing: -.03em; }
    .role { margin-top: 10px; color: var(--blue); font-size: clamp(18px, 2.3vw, 24px); font-weight: 700; }
    .tagline {
      margin-top: 16px;
      display: inline-block;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid rgba(216,164,75,.35);
      background: rgba(216,164,75,.08);
      color: var(--gold);
      font-weight: 800;
      font-size: clamp(17px, 2vw, 22px);
      letter-spacing: -.01em;
    }
    .contacts {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 28px 32px 18px;
    }
    .item {
      display: flex; gap: 14px; align-items: center;
      padding: 18px; min-height: 88px;
      border-radius: 20px; text-decoration: none; color: inherit;
      border: 1px solid rgba(255,255,255,.07);
      background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.018));
    }
    .item:hover { border-color: rgba(74,165,246,.35); background: linear-gradient(180deg, rgba(74,165,246,.08), rgba(255,255,255,.03)); }
    .icon { width: 46px; height: 46px; border-radius: 14px; display:grid; place-items:center; background: rgba(74,165,246,.12); border: 1px solid rgba(74,165,246,.24); color: var(--blue); font-size: 20px; font-weight: 700; flex: 0 0 auto; }
    .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .09em; margin-bottom: 6px; }
    .value { font-size: 18px; line-height: 1.28; word-break: break-word; }
    .website { grid-column: 1 / -1; }
    .footer { padding: 0 32px 26px; color: var(--muted); font-size: 14px; }
    .email span { white-space: nowrap; }
    @media (max-width: 760px) {
      .hero { grid-template-columns: 1fr; }
      .contacts { grid-template-columns: 1fr; }
      .website { grid-column: auto; }
    }
  </style>
</head>
